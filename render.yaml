# Render service configuration for GatePassSystem
# Copy this file into the repository root. Render will read it when creating
# a new service from this repo and branch.
services:
  - type: web
    name: gatepass-system
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: |
      python -m pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    # Environment variables: set these in Render dashboard for production secrets
    envVars:
      - key: ADMIN_EMAIL
        value: admin@123
      - key: ADMIN_PASSWORD
        value: admin123
      - key: ADMIN_NAME
        value: "Super Admin"
      - key: SECRET_KEY
        # Ask Render to generate a secret in the UI; here we use a placeholder
        value: replace-this-with-a-secure-random-value
      - key: DATABASE_URL
        # Default is a local sqlite file. For production use a managed DB like Postgres
        value: sqlite:///./data.db
    healthCheckPath: /
    autoDeploy: true
    pullRequestPreviews: false
    instanceType: starter
    instanceCount: 1
# Note: If you need multiple services or preview services, add them below.
# The above single service config is sufficient for a basic deploy.
