{% extends "base.html" %}
{% block title %}Sign Up — Campus GatePass{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 p-4 py-10">
    <div class="w-full max-w-md animate-fade-in-up">

        <!-- Logo -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-white/20 backdrop-blur-xl mb-3 shadow-lg">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold text-white tracking-tight">Create Account</h1>
            <p class="text-white/60 text-sm mt-1">Join Campus GatePass</p>
        </div>

        <!-- Card -->
        <div class="bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-7">

            {% if error %}
            <div class="mb-5 p-3.5 bg-red-50 border border-red-200 rounded-2xl text-sm text-red-600 flex items-center gap-2.5">
                <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                          d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                          clip-rule="evenodd"/>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/auth/student/signup" class="space-y-4">
                <!-- Name -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Full Name</label>
                    <input type="text" name="name" required
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50/50
                                  focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10
                                  transition-all outline-none text-sm placeholder-slate-400"
                           placeholder="e.g. Rahul Sharma">
                </div>

                <!-- Roll Number -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Roll Number</label>
                    <input type="text" name="roll_number" required
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50/50
                                  focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10
                                  transition-all outline-none text-sm placeholder-slate-400"
                           placeholder="e.g. 79">
                </div>

                <!-- Department & Year -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Department</label>
                        <select name="department" required
                                class="w-full px-3 py-3 rounded-xl border border-slate-200 bg-slate-50/50
                                       focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10
                                       transition-all outline-none text-sm text-slate-700 appearance-none">
                            <option value="" disabled selected>Select</option>
                            <option value="CS">CS</option>
                            <option value="IT">IT</option>
                            <option value="ENTC">ENTC</option>
                            <option value="MECH">MECH</option>
                            <option value="CIVIL">CIVIL</option>
                            <option value="AI&DS">AI&DS</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Year</label>
                        <select name="year" required
                                class="w-full px-3 py-3 rounded-xl border border-slate-200 bg-slate-50/50
                                       focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10
                                       transition-all outline-none text-sm text-slate-700 appearance-none">
                            <option value="" disabled selected>Select</option>
                            <option value="First Year">First Year</option>
                            <option value="Second Year">Second Year</option>
                            <option value="Third Year">Third Year</option>
                            <option value="Final Year">Final Year</option>
                        </select>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                    <input type="password" name="password" required minlength="6"
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50/50
                                  focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10
                                  transition-all outline-none text-sm placeholder-slate-400"
                           placeholder="Min 6 characters">
                </div>

                <button type="submit"
                        class="w-full py-3.5 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white
                               font-semibold rounded-xl shadow-lg shadow-indigo-500/25
                               hover:shadow-xl hover:shadow-indigo-500/40 hover:-translate-y-0.5
                               active:translate-y-0 transition-all duration-200 text-sm">
                    Create Account
                </button>
            </form>

            <p class="mt-5 text-center text-sm text-slate-500">
                Already have an account?
                <a href="/auth/student/login" class="text-indigo-600 font-semibold hover:text-indigo-700 transition">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
