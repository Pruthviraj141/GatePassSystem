{% extends "base.html" %}
{% block title %}Student Login — Campus GatePass{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 p-4">
    <div class="w-full max-w-md animate-fade-in-up">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-xl mb-4 shadow-lg">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold text-white tracking-tight">Campus GatePass</h1>
            <p class="text-white/60 text-sm mt-1">Student Portal</p>
        </div>

        <!-- Card -->
        <div class="bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-8">
            <h2 class="text-xl font-bold text-slate-800 mb-1">Welcome back</h2>
            <p class="text-sm text-slate-400 mb-6">Sign in with your roll number</p>

            {% if error %}
            <div class="mb-5 p-3.5 bg-red-50 border border-red-200 rounded-2xl text-sm text-red-600 flex items-center gap-2.5">
                <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                          d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                          clip-rule="evenodd"/>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/auth/student/login" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Roll Number</label>
                    <input type="text" name="roll_number" required autocomplete="username"
                           class="w-full px-4 py-3.5 rounded-xl border border-slate-200 bg-slate-50/50
                                  focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10
                                  transition-all outline-none text-sm placeholder-slate-400"
                           placeholder="Enter your roll number">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                    <input type="password" name="password" required autocomplete="current-password"
                           class="w-full px-4 py-3.5 rounded-xl border border-slate-200 bg-slate-50/50
                                  focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10
                                  transition-all outline-none text-sm placeholder-slate-400"
                           placeholder="Enter your password">
                </div>

                <button type="submit"
                        class="w-full py-3.5 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white
                               font-semibold rounded-xl shadow-lg shadow-indigo-500/25
                               hover:shadow-xl hover:shadow-indigo-500/40 hover:-translate-y-0.5
                               active:translate-y-0 transition-all duration-200 text-sm">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center space-y-3">
                <p class="text-sm text-slate-500">
                    Don't have an account?
                    <a href="/auth/student/signup" class="text-indigo-600 font-semibold hover:text-indigo-700 transition">Sign up</a>
                </p>
                <div class="h-px bg-slate-100"></div>
                <p class="text-xs text-slate-400">
                    <a href="/auth/admin/login" class="hover:text-slate-600 transition">Admin Login →</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
