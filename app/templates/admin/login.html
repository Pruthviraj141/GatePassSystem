{% extends "base.html" %}
{% block title %}Admin Login — Campus GatePass{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-900 p-4">
    <div class="w-full max-w-md animate-fade-in-up">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/10 backdrop-blur-xl mb-4 shadow-lg">
                <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold text-white tracking-tight">Admin Panel</h1>
            <p class="text-slate-400 text-sm mt-1">Campus GatePass Management</p>
        </div>

        <!-- Card -->
        <div class="bg-white/[0.07] backdrop-blur-xl rounded-3xl shadow-2xl border border-white/10 p-8">
            <h2 class="text-lg font-bold text-white mb-1">Welcome back</h2>
            <p class="text-sm text-slate-400 mb-6">Sign in with your admin credentials</p>

            {% if error %}
            <div class="mb-5 p-3.5 bg-red-500/10 border border-red-500/20 rounded-2xl text-sm text-red-400 flex items-center gap-2.5">
                <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                          d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                          clip-rule="evenodd"/>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/auth/admin/login" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
                    <input type="email" name="email" required autocomplete="email"
                           class="w-full px-4 py-3.5 rounded-xl border border-white/10 bg-white/5
                                  focus:bg-white/10 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-500/10
                                  transition-all outline-none text-sm text-white placeholder-slate-500"
                           placeholder="admin">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input type="password" name="password" required autocomplete="current-password"
                           class="w-full px-4 py-3.5 rounded-xl border border-white/10 bg-white/5
                                  focus:bg-white/10 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-500/10
                                  transition-all outline-none text-sm text-white placeholder-slate-500"
                           placeholder="Enter your password">
                </div>

                <button type="submit"
                        class="w-full py-3.5 px-4 bg-gradient-to-r from-indigo-500 to-purple-500 text-white
                               font-semibold rounded-xl shadow-lg shadow-indigo-500/25
                               hover:shadow-xl hover:shadow-indigo-500/40 hover:-translate-y-0.5
                               active:translate-y-0 transition-all duration-200 text-sm">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-xs text-slate-500">
                    <a href="/auth/student/login" class="hover:text-slate-300 transition">← Student Login</a>
                </p>
            </div>
        </div>

        <!-- Default credentials hint -->
        <div class="mt-4 text-center">
            <p class="text-xs text-slate-500">Default: admin / admin123</p>
        </div>
    </div>
</div>
{% endblock %}
